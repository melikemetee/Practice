<!DOCTYPE html>
<html>
<head>
    <title>To-Do</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background:#f4f6f8;
            text-align: center;
            margin-top: 50px;
        }

        h1{
            color: #333;
        }

        input{
            padding: 10px;
            width: 200px;
            border: 1px solid #ccc;
            border-radius: 6px;
        }

        button{
            padding: 10px 15px;
            margin-left: 5px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            background: #4CAF50;
            color: white;
        }

        li{
            background: white;
            margin: 10px auto;
            padding: 10px;
            width: 300px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
    </style>

</head>
<body>

    <h1>To-Do List</h1>

    <input id="taskInput" placeholder="Enter a task">
    <button id="addBtn">Add</button>

    <ul id="taskList"></ul>

    <script src="app.js"></script>

</body>
</html>
